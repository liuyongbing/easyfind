<!DOCTYPE html>
<html>
<head>
  <title>EasyFind 图标生成器</title>
</head>
<body>
  <h1>EasyFind 图标生成器</h1>
  <p>点击下方按钮生成并下载图标</p>
  <button onclick="generateIcons()">生成图标</button>
  <div id="output"></div>

  <script>
    function createIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // 背景圆
      ctx.fillStyle = '#1976D2';
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // 放大镜
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = Math.max(2, size / 16);
      ctx.lineCap = 'round';

      // 放大镜圆圈
      const circleRadius = size * 0.28;
      const circleX = size * 0.38;
      const circleY = size * 0.38;

      ctx.beginPath();
      ctx.arc(circleX, circleY, circleRadius, 0, Math.PI * 2);
      ctx.stroke();

      // 放大镜手柄
      ctx.beginPath();
      ctx.moveTo(circleX + circleRadius * 0.7, circleY + circleRadius * 0.7);
      ctx.lineTo(size * 0.75, size * 0.75);
      ctx.stroke();

      return canvas;
    }

    function generateIcons() {
      const sizes = [16, 48, 128];
      const output = document.getElementById('output');
      output.innerHTML = '';

      sizes.forEach(size => {
        const canvas = createIcon(size);

        // 显示预览
        const container = document.createElement('div');
        container.style.margin = '20px';

        const title = document.createElement('p');
        title.textContent = `icon${size}.png`;
        container.appendChild(title);

        const preview = canvas.cloneNode(true);
        const previewCtx = preview.getContext('2d');
        previewCtx.drawImage(canvas, 0, 0);
        container.appendChild(preview);

        // 下载链接
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.textContent = '下载';
        container.appendChild(link);

        output.appendChild(container);
      });
    }
  </script>
</body>
</html>
