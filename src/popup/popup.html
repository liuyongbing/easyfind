<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>易寻 EasyFind</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 主视图 -->
    <div id="view-main" class="view active">
      <header class="header">
        <h1 class="title">🔍 易寻 EasyFind</h1>
        <p class="subtitle">轻松找到你要的内容</p>
      </header>

      <section class="site-info">
        <span class="label">当前网站:</span>
        <span id="current-domain" class="domain">加载中...</span>
      </section>

      <section class="rules-section">
        <h2 class="section-title">筛选规则</h2>
        <div id="rules-list" class="rules-list">
          <div class="empty-state">暂无规则，点击下方按钮添加</div>
        </div>
      </section>

      <footer class="footer">
        <button id="btn-new" class="btn btn-primary">+ 新建规则</button>
        <div class="btn-group">
          <button id="btn-import" class="btn btn-secondary">导入</button>
          <button id="btn-export" class="btn btn-secondary">导出</button>
        </div>
      </footer>
    </div>

    <!-- 编辑视图 -->
    <div id="view-editor" class="view">
      <header class="editor-header">
        <button id="btn-back" class="btn-back">← 返回</button>
        <h2 id="editor-title" class="editor-title">新建规则</h2>
      </header>

      <form id="rule-form" class="rule-form">
        <div class="form-group">
          <label>规则名称 <span class="required">*</span></label>
          <input type="text" id="input-name" placeholder="例如: 筛选高价商品" required>
        </div>

        <div class="form-group">
          <label>适用域名</label>
          <input type="text" id="input-domains" placeholder="例如: *.taobao.com">
          <span class="hint">多个域名用逗号分隔，* 表示所有网站</span>
        </div>

        <div class="form-group">
          <label>目标选择器 <span class="required">*</span></label>
          <input type="text" id="input-selector" placeholder="例如: .product-item" required>
          <span class="hint">CSS 选择器，选中要筛选的元素</span>
        </div>

        <!-- 高级设置折叠区 -->
        <div class="advanced-section">
          <button type="button" class="advanced-toggle" id="btn-advanced">高级设置 ▼</button>
          <div class="advanced-content collapsed" id="advanced-content">
            <div class="form-group">
              <label>数据选择器 (可选)</label>
              <input type="text" id="input-data-selector" placeholder="例如: .price">
              <span class="hint">包含筛选数据的子元素</span>
            </div>

            <div class="form-group">
              <label>匹配正则 (可选)</label>
              <input type="text" id="input-pattern" placeholder="例如: (\d+)元">
              <span class="hint">用于提取数据的正则表达式</span>
            </div>

            <div class="form-group">
              <label>条件表达式</label>
              <div class="condition-row">
                <select id="select-condition-op">
                  <option value="contains">包含</option>
                  <option value="notContains">不包含</option>
                  <option value="matches">匹配正则</option>
                  <option value=">">大于</option>
                  <option value=">=">大于等于</option>
                  <option value="<">小于</option>
                  <option value="<=">小于等于</option>
                  <option value="==">等于</option>
                  <option value="!=">不等于</option>
                  <option value="isEmpty">为空</option>
                  <option value="isNotEmpty">不为空</option>
                </select>
                <input type="text" id="input-condition-value" placeholder="值">
              </div>
              <span class="hint">支持单位: K(千)、M(百万)、万、亿</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group half">
            <label>匹配时</label>
            <select id="select-match-action">
              <option value="highlight">高亮</option>
              <option value="dim">淡化</option>
              <option value="hide">隐藏</option>
              <option value="none">无操作</option>
            </select>
          </div>
          <div class="form-group half">
            <label>不匹配时</label>
            <select id="select-nomatch-action">
              <option value="none">无操作</option>
              <option value="dim">淡化</option>
              <option value="hide">隐藏</option>
            </select>
          </div>
        </div>
      </form>

      <footer class="editor-footer">
        <button type="button" id="btn-test" class="btn btn-secondary">测试</button>
        <button type="button" id="btn-cancel" class="btn btn-secondary">取消</button>
        <button type="submit" form="rule-form" id="btn-save" class="btn btn-primary">保存</button>
      </footer>
    </div>
  </div>

  <script src="../utils/storage.js"></script>
  <script src="editor.js"></script>
  <script src="popup.js"></script>
</body>
</html>
